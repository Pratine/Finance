name: Release

on:
  push:
    tags: ['v*']

jobs:
  # ── 1. Create the GitHub release ──────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create release
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "v${{ steps.ver.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Build Windows installer + portable demo ────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.create-release.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json

      - name: Build installer
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build portable demo
        run: node scripts/build-demo.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        shell: bash
        run: |
          gh release upload "v${VERSION}" \
            "release/Finance Setup ${VERSION}.exe" \
            "release/Finance Setup ${VERSION}.exe.blockmap" \
            "release/latest.yml" \
            "release/Finance-Demo-${VERSION}-portable.exe" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Build Linux AppImage ───────────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.create-release.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json

      - name: Build Linux AppImage
        run: npx electron-builder --linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        run: |
          gh release upload "v${VERSION}" release/*.AppImage --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Build macOS DMG ────────────────────────────────────────────────────
  build-macos:
    needs: create-release
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.create-release.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        run: |
          gh release upload "v${VERSION}" release/*.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
