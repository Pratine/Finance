name: Build Windows

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build renderer
        run: npx vite build

      - name: Build main process
        run: npx tsc -p tsconfig.electron.json

      - name: Build installer
        run: npx electron-builder --win nsis
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build portable demo
        run: node scripts/build-demo.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" \
            "release/Finance Setup ${VERSION}.exe" \
            "release/Finance Setup ${VERSION}.exe.blockmap" \
            "release/latest.yml" \
            "release/Finance-Demo-${VERSION}-portable.exe" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
